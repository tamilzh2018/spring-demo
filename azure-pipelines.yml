# Demo Spring AzurePipeline

trigger:
  branches:
    include:
      - master
# Any pull request raise to this branch, run the pipeline
pr:
  branches:
    include:
      - master

pool: 
  name: Default
  demands:
  - maven
  # vmImage: ubuntu-latest

stages:
  - stage: 'BuildArtifact'
    displayName: 'Building java artifacts'
    jobs:
    - job: 'BuildArtifact'
      displayName: 'Building java artifacts'
      steps:
      - task: Maven@4
        inputs:
          mavenPomFile: 'pom.xml'
          goals: 'clean package'
          options: '--no-transfer-progress'
          publishJUnitResults: true
          testResultsFiles: '**/surefire-reports/TEST-*.xml'
          javaHomeOption: 'Path'
          jdkDirectory: 'C:\Program Files\Java\jdk-24'
          mavenVersionOption: 'Default'
          mavenAuthenticateFeed: false
          effectivePomSkip: false
          sonarQubeRunAnalysis: false

      - task: CopyFiles@2
        inputs:
          SourceFolder: '$(agent.builddirectory)/s/target'
          Contents: '*.jar'
          TargetFolder: '$(build.artifactstagingdirectory)'
          CleanTargetFolder: true
          OverWrite: true

      - task: PublishBuildArtifacts@1
        inputs:
          PathtoPublish: '$(Build.ArtifactStagingDirectory)'
          ArtifactName: 'spring-demo'
          publishLocation: 'Container'
  - stage: 'DockerImage'
    displayName: 'Build Docker Image'
    condition: and(succeeded(),ne(variables['Build.Reason'],'PullRequest')) # previous steps should succeed and build reason should not be pull request
    dependsOn: 'BuildArtifact' 
    jobs:
    - job: 'DockerImagejob'
      displayName: 'Build Docker Image and Push to ACR'
      steps:
      - task: DownloadBuildArtifacts@0
        inputs:
          buildType: 'current'
          downloadType: 'single'
          artifactName: 'spring-demo'
          downloadPath: '.'
      - task: CopyFiles@2
        inputs:
          SourceFolder: 'spring-demo'
          Contents: '*.jar'
          TargetFolder: '$(build.artifactstagingdirectory)/s/spring-demo'

      - task: Docker@2
        inputs:
          containerRegistry: $(dockerRegistryServiceConnection)
          repository: $(imageRepository)
          command: 'buildAndPush'
          Dockerfile: $(dockerfilePath)
          tags: '$(Build.BuildId)'
