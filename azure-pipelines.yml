trigger:
  branches:
    include:
      - master

pr:
  branches:
    include:
      - master

variables:
  dockerRegistryServiceConnection: '0c41c105-34f3-4bc2-a577-e0219f561aed'
  imageRepository: 'tamilzhspringdemo'
  containerRegistry: 'springdemo.azurecr.io'
  dockerfilePath: 'Dockerfile'
  tag: '$(Build.BuildId)'

pool:
  vmImage: 'ubuntu-latest'

stages:

# ==========================
# Build Java Artifact
# ==========================
- stage: BuildArtifact
  displayName: Build Java Artifact

  jobs:
  - job: BuildArtifact
    displayName: Build Spring Boot JAR

    steps:
      - template: 'templates/build.yaml'

# ==========================
# Build & Push Docker Image
# ==========================
- stage: DockerImage
  displayName: Build and Push Docker Image
  dependsOn: BuildArtifact
  condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))

  jobs:
  - job: DockerImageJob
    displayName: Build Docker Image

    steps:
      - template: 'templates/dockerize.yaml'