trigger:
  branches:
    include:
      - master

pr:
  branches:
    include:
      - master

variables:
  dockerRegistryServiceConnection: '0c41c105-34f3-4bc2-a577-e0219f561aed'
  imageRepository: 'tamilzhspringdemo'
  containerRegistry: 'springdemo.azurecr.io'
  dockerfilePath: 'Dockerfile'
  tag: '$(Build.BuildId)'

pool:
  vmImage: 'ubuntu-latest'

stages:
# ==========================
# Build Numbers Based on Bracnhes
# ==========================
- stage: BuildBranchName
  displayName: Build Branch Name

  jobs:
  - job: BuildBranchNameJob
    variables:
      branchName: $Build.SourceBranch
      branchPRNumber: $[counter(variables['System.PullRequest.PullRequestId'], 0)]
      branchBuildNumber: $[counter(variables['Build.SourceBranch'], 0)]
    displayName: Build Branch Name Job
    steps:
    - template: 'templates/buildNumbers.yaml'
# ==========================
# Build Java Artifact
# ==========================
- stage: BuildArtifact
  displayName: Build Java Artifact

  jobs:
  - job: BuildArtifact
    displayName: Build Spring Boot JAR

    steps:
      - template: 'templates/build.yaml'

# ==========================
# Build & Push Docker Image
# ==========================
- stage: DockerImage
  displayName: Build and Push Docker Image
  dependsOn: BuildArtifact
  condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))

  jobs:
  - job: DockerImageJob
    displayName: Build Docker Image

    steps:
      - template: 'templates/dockerize.yaml'