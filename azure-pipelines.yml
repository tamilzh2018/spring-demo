# Demo Spring AzurePipeline

trigger:
  branches:
    include:
      - master
# Any pull request raise to this branch, run the pipeline
pr:
  branches:
    include:
      - master

pool:
  name: Default
  # vmImage: ubuntu-latest

stages:
  - stage: 'BuildArtifact'
    displayName: 'Building java artifacts'
    jobs:
    - job: 'BuildArtifact'
      displayName: 'Building java artifacts'

      steps:
      - script: |
          echo JAVA_HOME=%JAVA_HOME%
          echo MAVEN_HOME=%MAVEN_HOME%
          where java
          where mvn
          java -version
          mvn -version
        displayName: Check Java Maven

      - task: Maven@4
        inputs:
          mavenPomFile: 'pom.xml'
          goals: 'clean package'
          options: '--no-transfer-progress'
          publishJUnitResults: true
          testResultsFiles: '**/surefire-reports/TEST-*.xml'
          javaHomeOption: 'Path'
          jdkDirectory: 'C:\Program Files\Java\jdk-17'
          mavenVersionOption: 'Default'
      - task: CopyFiles@2
        inputs:
          SourceFolder: '$(agent.builddirectory)/s/target'
          Contents: '*.jar'
          TargetFolder: '$(build.artifactstagingdirectory)'
          CleanTargetFolder: true
          OverWrite: true

      - task: PublishBuildArtifacts@1
        inputs:
          PathtoPublish: '$(Build.ArtifactStagingDirectory)'
          ArtifactName: 'spring-demo'
          publishLocation: 'Container'

